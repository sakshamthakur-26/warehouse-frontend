<div class="table-card">
  <div class="table-header">
    <h2 class="table-title">Current Inventory</h2>
    <!-- <button class="btn-export">Export</button> -->
  </div>
  
  <div class="table-responsive">
    <table class="inventory-table">
      <thead>
        <tr>
          <th>Item Id</th>
          <th>Item Name</th>
          <th>Category</th>
          <th>Quantity</th>
          <th>Location/Zone</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        @for (item of _stockService.stockItem(); track item.itemId) {
          <tr>
            <td class="font-medium">{{item.itemId}}</td>
            <td class="font-medium">{{item.name}}</td>
            <td class="text-gray">{{item.category}}</td>
            <td>{{item.quantity}}</td>
            <td>{{item.zone}}</td>
            <td><span class="badge badge-success">In Stock</span></td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
