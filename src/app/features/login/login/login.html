<div class="auth-container">

  <div class="auth-card">

    <h2>Login</h2>
    <p class="subtitle">
      Access your warehouse dashboard
    </p>

    <form (ngSubmit)="login()" class="form-box">

      <input [(ngModel)]="loginData.username" name="username" placeholder="Username" required>

      <input [(ngModel)]="loginData.password" name="password" type="password" placeholder="Password"required>

      <button type="submit" class="login-btn">
        Login
      </button>

    </form>

    <p class="bottom-text">
      New user?
      <a routerLink="/register">Create Account</a>
    </p>

  </div>

</div>
