<div class="form-card">
  <h2 class="form-title">Add New Stock</h2>

  <form class="stock-form" (ngSubmit)="addStock()">
    <div class="form-group">
      <label for="itemName">Item Name <span class="required">*</span></label>
      <input type="text" id="itemName" name="itemName" [(ngModel)]="_inventory._stockService.AddStockItem().itemName"
        (ngModelChange)="_inventory._stockService.AddStock.update(s=>({...s,itemName: $event}))"
        placeholder="Enter item name">
    </div>

    <div class="form-group">
      <label for="quantity">Quantity <span class="required">*</span></label>
      <input type="number" min="1" id="quantity" name="quantity"
        [(ngModel)]="_inventory._stockService.AddStockItem().quantity"
        (ngModelChange)="_inventory._stockService.AddStock.update(s=>({...s,quantity: $event}))"
        placeholder="Enter quantity">
    </div>

    <div class="form-group">
      <label for="Category">Category <span class="required">*</span></label>
      <select id="category" name="category" [(ngModel)]="_inventory._stockService.AddStockItem().category"
        (change)="onCategoryChange($any($event.target).value)"
        (ngModelChange)="_inventory._stockService.AddStock.update(s=>({...s,category: $event}))">
        <option value="" disabled selected>Select Category</option>

        @for(item of _categories.CategoriesName(); track $index) {

        <option [value]="item">{{item}}</option>
        }

      </select>
    </div>

    <div class="form-group">
      <label for="vendor">Select Vendor</label>
      <select id="vendor" name="vendor" [(ngModel)]="_inventory._stockService.AddStockItem().vendor"
        (ngModelChange)="_inventory._stockService.AddStock.update(s=>({...s,vendor: $event}))">
        <option value="" disabled selected>Select Vendor</option>

        @for(vendor of _vendor._filteredVendorName(); track $index) {
        <option [value]="vendor">{{vendor}}</option>

        }

      </select>
    </div>

    <div class="form-group">
      <label for="lowStock">Low Stock Alert Threshold <span class="required">*</span></label>
      <input type="number" min="1" id="lowStock" name="lowStock" value="10"
        [(ngModel)]="_inventory._stockService.AddStockItem().threshold"
        (ngModelChange)="_inventory._stockService.AddStock.update(s=>({...s,threshold: $event}))">
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-cancel" (click)="resetForm()">Cancel</button>
      <button type="submit" class="btn btn-submit">Add Stock</button>
    </div>
  </form>
</div>
