<div class="form-card">
  <h2 class="form-title">Add New Stock</h2>
  
  <form class="stock-form">
    <div class="form-group">
      <label for="itemName">Item Name <span class="required">*</span></label>
      <input type="text" id="itemName" name="itemName" placeholder="Enter item name">
    </div>

    <div class="form-group">
      <label for="quantity">Quantity <span class="required">*</span></label>
      <input type="number" id="quantity" name="quantity" placeholder="Enter quantity">
    </div>

    <div class="form-group">
      <label for="zoneName">Zone Name <span class="required">*</span></label>
      <select id="zoneName" name="zoneName">
        <option value="" disabled selected>Select Zone Name</option>
        <option value="electronics">Electronics</option>
        <option value="furniture">Furniture</option>
        <option value="clothing">Clothing</option>
      </select>
    </div>

    <div class="form-group">
      <label for="vendor">Select Vendor</label>
      <select id="vendor" name="vendor">
        <option value="" disabled selected>Select Vendor</option>
        <option value="techcorp">TechCorp</option>
        <option value="furnimakers">FurniMakers</option>
      </select>
    </div>

    <div class="form-group">
      <label for="lowStock">Low Stock Alert Threshold <span class="required">*</span></label>
      <input type="number" id="lowStock" name="lowStock" value="10">
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-cancel">Cancel</button>
      <button type="submit" class="btn btn-submit">Add Stock</button>
    </div>
  </form>
</div>
