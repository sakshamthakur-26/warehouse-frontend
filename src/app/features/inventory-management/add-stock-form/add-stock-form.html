<div class="form-card">
  <h2 class="form-title">Add New Stock</h2>

  <form class="stock-form" [formGroup]="addStockForm" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label for="itemName">Item Name <span class="required">*</span></label>
      <input type="text" id="itemName" name="itemName" formControlName="itemName" placeholder="Enter item name">
    </div>



    <div class="form-group">
      <label for="quantity">Quantity <span class="required">*</span></label>
      <input type="number" min="1" id="quantity" formControlName="quantity" placeholder="Enter quantity">
    </div>

    <div class="form-group">
      <label for="categoryName">Category <span class="required">*</span></label>
      <select id="category" formControlName="categoryName">
        <option value="" disabled selected>Select Category</option>
        @for(item of _categories.CategoriesName(); track $index) {
        <option [value]="item">{{item}}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="vendorName">Select Vendor</label>
      <select id="vendor" formControlName="vendorName">
        <option value="" disabled selected>Select Vendor</option>
        @for(vendor of _vendor._filteredVendorName(); track $index) {
        <option [value]="vendor">{{vendor}}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="threshold">Low Stock Alert Threshold <span class="required">*</span></label>
      <input type="number" min="0" id="threshold" formControlName="threshold">
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-cancel" (click)="resetForm()">Cancel</button>
      <button type="submit" class="btn btn-submit" [disabled]="addStockForm.invalid">Add Stock</button>
    </div>
  </form>
</div>
