<div class="form-card">
  <h2 class="form-title">Dispatch / Remove Stock</h2>
  
  <form class="stock-form">
    <div class="form-group">
      <label for="removeItemName">Select Item to Dispatch <span class="required">*</span></label>
      <select id="removeItemName" name="removeItemName">
        <option value="" disabled selected>Select an item from inventory...</option>
        <option value="1">Laptops</option>
        <option value="2">Office Chairs</option>
        <option value="3">Wireless Mice</option>
      </select>
    </div>

    <div class="form-group">
      <label for="removeQuantity">Quantity to Dispatch <span class="required">*</span></label>
      <input type="number" id="removeQuantity" name="removeQuantity" placeholder="Enter quantity">
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-cancel">Cancel</button>
      <button type="submit" class="btn btn-danger">Dispatch Stock</button>
    </div>
  </form>
</div>
