<div class="form-card">
  <h2 class="form-title">Dispatch / Remove Stock</h2>

  <form class="stock-form">
    <div class="form-group">
      <label for="dispatchItem">Select Item to Dispatch</label>

      <select id="dispatchItem" [ngModel]="_stockService.RemoveStock().itemId"
        (ngModelChange)="_stockService.RemoveStock.update(s => ({...s, itemId: $event}))">
        <option value="0" disabled selected>Select an Item...</option>
        @for(item of _stockService.loadAllStock(); track item.itemId) {
        <option [value]="item.itemId">
          {{item.name}} (Available: {{item.quantity}})
        </option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="dispatchQty">Quantity to Remove</label>
      <input type="number" id="dispatchQty" [ngModel]="_stockService.RemoveStock().quantity"
        (ngModelChange)="_stockService.RemoveStock.update(s => ({...s, quantity: $event}))" />
    </div>

    <button (click)="_stockService.dispatchStock()" class="btn-submit">
      Dispatch Stock
    </button>
  </form>
</div>
